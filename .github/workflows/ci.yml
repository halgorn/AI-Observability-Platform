name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  spec-lint:
    name: Spec conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install jsonschema
      - run: make spec-lint-verbose
      - run: make spec-fix | head -20
        if: always()

  test-sdk:
    name: ai-obs-sdk tests
    needs: spec-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ai-obs-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=src/ai_obs --cov-fail-under=70 -q

  test-ingest:
    name: ingest-api tests
    needs: spec-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingest-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev,observability]"
      - run: pytest tests/ --cov=app --cov-fail-under=80 -q

  test-query:
    name: query-api tests
    needs: spec-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/query-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=app --cov-fail-under=70 -q

  test-replay:
    name: replay-engine tests
    needs: spec-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/replay-engine
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=app --cov-fail-under=70 -q

  test-judge:
    name: judge tests
    needs: spec-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/judge
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -e ".[dev]"
      - run: pytest tests/ --cov=app --cov-fail-under=70 -q

  eval:
    name: Regression eval (judge scoring)
    needs: test-judge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install judge deps
        working-directory: services/judge
        run: pip install -e ".[dev]"
      - name: Run regression eval
        run: python evals/run_eval.py --report /tmp/eval-report.json
      - name: Upload eval report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report
          path: /tmp/eval-report.json

  build:
    name: Build Docker image
    needs: [test-ingest, test-query, test-replay, test-judge, test-sdk, eval]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ingest-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ingest-api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ingest-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ingest-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Fly.io (staging)
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        working-directory: services/ingest-api
        run: flyctl deploy --remote-only --strategy bluegreen
