name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  PYTHON_VERSION: "3.12"

jobs:
  spec-lint:
    name: Spec conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install spec tools deps
        run: pip install jsonschema
      - name: Run all spec tools
        run: make spec-lint-verbose
      - name: List pending external refs
        if: always()
        run: make spec-fix | head -20

  test-ingest:
    name: ingest-api tests
    runs-on: ubuntu-latest
    needs: spec-lint
    defaults:
      run:
        working-directory: services/ingest-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install service + dev deps
        run: pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80 -v
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-ingest
          path: services/ingest-api/coverage.xml

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [spec-lint, test-ingest]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: services/ingest-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name == 'push'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/ingest-api/Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ingest-api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/ingest-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Fly.io (staging)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
        working-directory: services/ingest-api
        run: flyctl deploy --remote-only --strategy bluegreen
