version: "3.9"

# Local dev stack: ingest-api + query-api + Postgres + Grafana + Prometheus
# Public ingress: handled by nginx in front of ingest-api (see infra/nginx/).
# Usage:
#   INGEST_API_SECRET=mysecret docker compose up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aiobs
      POSTGRES_PASSWORD: aiobs
      POSTGRES_DB: aiobs
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiobs -d aiobs"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  ingest-api:
    build:
      context: .
      dockerfile: services/ingest-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      SPEC_ROOT: /app/specs
      PII_MODE: ${PII_MODE:-redact}
      INGEST_API_SECRET: ${INGEST_API_SECRET:-dev-secret-change-me}
      DOCS_ENABLED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      POSTGRES_DSN: postgresql://aiobs:aiobs@postgres:5432/aiobs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - default
      - ai-obs-shared

  query-api:
    build:
      context: .
      dockerfile: services/query-api/Dockerfile
    ports:
      - "8011:8001"
    environment:
      POSTGRES_DSN: postgresql://aiobs:aiobs@postgres:5432/aiobs
      INGEST_API_SECRET: ${INGEST_API_SECRET:-dev-secret-change-me}
      DOCS_ENABLED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      ingest-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  replay-engine:
    build:
      context: .
      dockerfile: services/replay-engine/Dockerfile
    ports:
      - "8012:8002"
    environment:
      PORT: "8002"
      INGEST_API_SECRET: ${INGEST_API_SECRET:-dev-secret-change-me}
      QUERY_API_URL: http://query-api:8001
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      query-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8002/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=3d"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/agent-overview.json
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  default:
  ai-obs-shared:
    external: true
