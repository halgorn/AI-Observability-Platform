version: "3.9"

# Local dev stack: ingest-api + Grafana + Prometheus + ngrok
# Usage:
#   NGROK_AUTHTOKEN=<token> docker compose up
#   INGEST_API_SECRET=mysecret NGROK_AUTHTOKEN=<token> docker compose up

services:
  ingest-api:
    build:
      context: .
      dockerfile: services/ingest-api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      SPEC_ROOT: /app/specs
      PII_MODE: ${PII_MODE:-redact}
      INGEST_API_SECRET: ${INGEST_API_SECRET:-dev-secret-change-me}
      DOCS_ENABLED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/v1/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=3d"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/agent-overview.json
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command: http ingest-api:8000 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "4040:4040"
    depends_on:
      ingest-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
